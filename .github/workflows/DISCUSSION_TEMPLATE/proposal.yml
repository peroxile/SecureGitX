name: Proposal
description: Propose a new SecureGitX rule or feature
title: "[proposal]: "
labels:
  - discussion
body:
  - type: dropdown
    id: proposal_type
    attributes:
      label: Proposal type
      description: Choose the kind of proposal.
      options:
        - Rule proposal
        - Feature request
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Briefly describe the rule or feature.
      placeholder: What should SecureGitX detect or support?
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: Why is this needed?
      placeholder: Explain the gap, false positive, missing workflow, or usability issue.
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: Proposed change
      description: Describe the rule pattern or feature behavior.
      placeholder: |
        Rule proposal:
        - pattern
        - examples
        - non-examples

        Feature request:
        - expected behavior
        - user flow
        - scope
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Security and usability impact
      description: Explain the benefit and any risks.
      placeholder: Consider false positives, enforcement behavior, performance, and UX.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional.
      placeholder: What else could solve this?
    validations:
      required: false